<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Teste - Clique no Alvo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 800px;
            width: 90%;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        #game-area {
            position: relative;
            width: 100%;
            height: 400px;
            background: #f9f9f9;
            border: 3px dashed #667eea;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            cursor: crosshair;
        }

        .target {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            animation: pulse 0.5s infinite alternate;
        }

        .target:hover {
            transform: scale(1.1);
        }

        .target:active {
            transform: scale(0.9);
        }

        @keyframes pulse {
            from {
                box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            }
            to {
                box-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
            }
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Jogo de Teste</h1>
        <p>Clique nos alvos o mais rápido possível!</p>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Pontuação</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Tempo</div>
                <div class="stat-value" id="timer">30</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Recorde</div>
                <div class="stat-value" id="highscore">0</div>
            </div>
        </div>

        <div id="game-area">
            <div class="message info" id="start-message">
                Clique em "Iniciar Jogo" para começar!
            </div>
        </div>

        <div>
            <button class="btn" id="start-btn" onclick="startGame()">Iniciar Jogo</button>
            <button class="btn" id="stop-btn" onclick="stopGame()" disabled>Parar</button>
        </div>

        <div class="message hidden" id="end-message"></div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let spawnInterval;
        let isPlaying = false;
        let highScore = localStorage.getItem('highScore') || 0;

        const gameArea = document.getElementById('game-area');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const highScoreDisplay = document.getElementById('highscore');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const startMessage = document.getElementById('start-message');
        const endMessage = document.getElementById('end-message');

        highScoreDisplay.textContent = highScore;

        function startGame() {
            if (isPlaying) return;

            score = 0;
            timeLeft = 30;
            isPlaying = true;

            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            startMessage.classList.add('hidden');
            endMessage.classList.add('hidden');
            startBtn.disabled = true;
            stopBtn.disabled = false;

            // Clear game area
            gameArea.innerHTML = '';

            // Start timer
            gameInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Spawn targets
            spawnTarget();
            spawnInterval = setInterval(spawnTarget, 800);
        }

        function stopGame() {
            endGame();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            startBtn.disabled = false;
            stopBtn.disabled = true;

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
                highScoreDisplay.textContent = highScore;
                endMessage.textContent = `🎉 Novo Recorde! Sua pontuação: ${score}`;
                endMessage.className = 'message success';
            } else {
                endMessage.textContent = `Fim de jogo! Sua pontuação: ${score}`;
                endMessage.className = 'message info';
            }

            endMessage.classList.remove('hidden');

            // Clear all targets
            const targets = document.querySelectorAll('.target');
            targets.forEach(target => target.remove());
        }

        function spawnTarget() {
            if (!isPlaying) return;

            const target = document.createElement('div');
            target.className = 'target';

            // Random position within game area
            const maxX = gameArea.clientWidth - 50;
            const maxY = gameArea.clientHeight - 50;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';

            target.onclick = () => {
                score++;
                scoreDisplay.textContent = score;
                target.remove();
                
                // Speed up as score increases
                if (score % 5 === 0 && spawnInterval) {
                    clearInterval(spawnInterval);
                    const newInterval = Math.max(400, 800 - (score * 10));
                    spawnInterval = setInterval(spawnTarget, newInterval);
                }
            };

            gameArea.appendChild(target);

            // Remove target after 2 seconds if not clicked
            setTimeout(() => {
                if (target.parentNode && isPlaying) {
                    target.remove();
                }
            }, 2000);
        }
    </script>
</body>
</html>
